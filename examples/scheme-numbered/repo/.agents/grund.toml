grund_config_version = 1

[id]
# Pure-numeric scheme — `{kind}-{number}`. RFC-style.
format = "{kind}-{number}"
section_separator = "."

# Override the default kinds list to demonstrate a project that
# tracks RFC-shaped specs alongside its functional spec.
[[kinds]]
prefix = "RFC"
folder = "docs/rfcs"
title = "Request for Comments"

[[kinds]]
prefix = "FS"
folder = "docs/functional-spec"
title = "Functional spec"

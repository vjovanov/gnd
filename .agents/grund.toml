grund_config_version = 1
project_name = "grund"

[reference]
marker = "§"
trigger = "$$"
strict = true
require_grounding = true
inline_style = "citation-with-note"
inline_note_suggested_lines = 1
inline_note_max_lines = 25
inline_note_max_columns = 180
warn_on_suggested = false

[id]
# Slug-only IDs — see FS-config.3.2. Slugs must be unique within a kind.
# Slug must start with a letter so digit-prefixed tokens (e.g. `FS-001`
# in illustrative prose) are not picked up as citations.
format = "{kind}-{slug}"
section_separator = "."
section_heading_levels = "strict"
slug_pattern = "[a-z][a-z0-9-]*"

[[kinds]]
prefix = "GND"
file = "docs/grund.md"
title = "Reason for existence"

[[kinds]]
prefix = "GOAL"
file = "docs/goals.md"
title = "Outcomes the project is trying to achieve"

[[kinds]]
prefix = "FS"
folder = "docs/functional-spec"
title = "User-visible behavior and requirements"

[[kinds]]
prefix = "AR"
folder = "docs/architecture"
title = "System design and technical structure"

# DF before DA, matching the canonical default kind order (FS-config.3.4, templates/grund.toml).
[[kinds]]
prefix = "DF"
folder = "docs/decisions/functional"
title = "Product behavior decisions and tradeoffs"

[[kinds]]
prefix = "DA"
folder = "docs/decisions/architectural"
title = "Architecture decisions and tradeoffs"

[[kinds]]
prefix = "E2E"
folder = "e2e/cases"
title = "Executable user scenarios"

[[kinds]]
prefix = "RM"
file = "docs/roadmap.md"
title = "Planned milestones and sequencing"

[[kinds]]
prefix = "DISC"
folder = "docs/discussions"
title = "Design discussions and proposals"

[scan]
include = ["docs", "e2e", "src", "crates"]
# `repo` / `expected.repo`: the e2e fixture trees under `e2e/cases/*/` are test
# inputs, not this project's code — keep them out of the host scan so strict mode
# and `require_grounding` (above) apply to grund's own sources, not the fixtures.
exclude = ["target", "node_modules", ".git", "dist", "build", ".venv", "repo", "expected.repo", "assets"]
extensions = ["md", "rs", "go", "java", "kt", "ts", "tsx", "js", "py", "c", "cpp", "swift", "scala", "rb", "php", "cs"]
comment_prefixes = ["//", "#", ";", "--", "*", "/*"]
docstring_python = true
respect_gitignore = true

[output]
format = "text"
color = "auto"
relative_paths = true

[fmt.cross_refs]
enabled = true
anchor_format = "github"

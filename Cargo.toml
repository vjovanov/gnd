[package]
name = "gnd"
version = "0.1.0"
edition = "2024"
description = "Agent grounding tool — verify and read ID-based references in league-of-code style docs"
license = "MIT"
repository = "https://github.com/vjovanov/gnd"
homepage = "https://github.com/vjovanov/gnd"
readme = "README.md"
exclude = [
    ".agents/rhei/**",
    "Cargo.toml.orig",
    "target/**",
]

[dependencies]
ignore = "0.4"
regex = "1"
anyhow = "1"
once_cell = "1"
unicode-normalization = "0.1"

[profile.release]
lto = true
codegen-units = 1

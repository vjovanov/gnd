name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Treat rustc warnings as errors for the binary itself. NOTE: this does not
  # deny clippy lints — clippy is intentionally not part of CI here. Add a
  # `cargo clippy --no-deps -- -D warnings` step if/when we want lint enforcement.
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Run every matrix leg even if one fails so we can see Linux + macOS + Windows
      # results together rather than aborting after the first failure.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      # Pinned to a tagged release rather than @master so a compromise of the
      # action repo doesn't silently change CI behavior on unrelated PRs.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: changelog PR entry
        if: github.event_name == 'pull_request'
        run: python scripts/check_changelog_pr_entry.py --pr-number "${{ github.event.pull_request.number }}"

      - name: python tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Install pre-commit hook dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m pip install pre-commit
          cargo install lychee --version 0.23.0 --locked

      # `.pre-commit-config.yaml` is the local gate; CI runs it directly so every
      # pre-commit hook remains enforced remotely (§AR-ci.1).
      - name: pre-commit
        if: matrix.os == 'ubuntu-latest'
        run: pre-commit run --all-files

      - name: cargo build
        run: cargo build --workspace --all-targets --locked

      - name: grund self-check
        shell: bash
        run: |
          # `timeout 30` is the catastrophic-regression guard (§AR-ci.4 / §GOAL-fast-feedback):
          # `grund .` on this repo runs in tens of milliseconds, so a 30s ceiling never
          # flakes but still trips on a quadratic walk or a second read pass. The precise
          # per-commit meter is the `bench` job (§AR-benchmarks / §AR-ci.5); this timeout
          # is its backstop. Use Python rather than GNU `timeout` so the same step runs
          # on Linux, macOS, and Windows.
          python - <<'PY'
          import subprocess
          import sys

          try:
              result = subprocess.run(
                  ["cargo", "run", "--locked", "--", "check", ".", "--format", "json"],
                  stdout=subprocess.PIPE,
                  timeout=30,
              )
          except subprocess.TimeoutExpired:
              print("grund self-check exceeded 30s", file=sys.stderr)
              sys.exit(124)

          if result.returncode != 0:
              sys.exit(result.returncode)
          if result.stdout:
              print("grund self-check wrote unexpected stdout:", file=sys.stderr)
              sys.stderr.buffer.write(result.stdout)
              sys.exit(1)
          PY

      # tests/e2e.rs walks every fixture under e2e/cases and asserts each case's
      # exit code, stdout, and stderr against its expected.* files; tests/init.rs
      # covers the file-content / config-validation contract for `grund init`. So
      # `cargo test` runs the full e2e suite plus the unit tests in src/main.rs.
      - name: cargo test
        run: cargo test --workspace --all-targets --locked

  # Instruction-counting benchmarks for the hot CLI commands (§AR-benchmarks /
  # §AR-ci.5). Kept out of the `test` matrix because the harness runs `grund` under
  # Callgrind — only this job needs Valgrind, and the `bench` Cargo feature gate
  # keeps the matrix above from building or running it. One platform: it measures
  # instruction counts, not cross-platform behavior. Records the numbers per
  # commit; the build-failing regression threshold on a committed baseline is the
  # remaining §RM-benchmarks work.
  bench:
    name: cargo bench (instruction counts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-
            ${{ runner.os }}-cargo-

      - name: Install Valgrind and iai-callgrind-runner
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
          # The runner version must match the `iai-callgrind` dev-dependency in Cargo.toml.
          cargo install iai-callgrind-runner --version 0.16.1 --locked

      - name: cargo bench
        run: cargo bench --features bench --locked

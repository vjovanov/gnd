# Run `gnd check`, `gnd fmt --md-links`, and `lychee` before every commit. With
# `[reference] require_grounding = true` in `.agents/gnd.toml`, `gnd check` also
# enforces the grounding floor (§FS-check.3.6): every source file under
# `[scan] include` must cite a declared ID. `gnd fmt --md-links --write` keeps
# every `§…` citation in the `.md` tree wrapped in a clickable link to its
# declaration (§FS-fmt.6) — idempotent, so it is a no-op when nothing drifted; a
# heading rename or file move shows up as a one-line `fmt` diff and pre-commit
# aborts so the change can be re-staged. `lychee --include-fragments` then checks
# that those links — and every other Markdown link — resolve, *including* the
# `#fragment` (§DF-github-anchor-fidelity), so a stale anchor fails the commit.
#
# Uses `cargo run` so a fresh clone needs no installed `gnd`; if you have the
# binary on PATH, swap each `entry` for `gnd …` (the form shown in the README).
#
# One-time setup:
#   pip install pre-commit
#   cargo install lychee
#   pre-commit install
repos:
  - repo: local
    hooks:
      - id: gnd-check
        name: gnd check
        entry: cargo run --quiet -- check
        language: system
        pass_filenames: false
        always_run: true
      - id: gnd-fmt-md-links
        name: gnd fmt --md-links
        entry: cargo run --quiet -- fmt --md-links --write
        language: system
        pass_filenames: false
        always_run: true
      - id: lychee
        name: lychee
        entry: lychee --no-progress --include-fragments README.md docs
        language: system
        pass_filenames: false
        always_run: true

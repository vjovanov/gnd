# Run `grund check`, `grund fmt`, and `lychee` before every commit. With
# `[reference] require_grounding = true` in `.agents/grund.toml`, `grund check` also
# enforces the grounding floor (§FS-check.3.6): every source file under
# `[scan] include` must cite a declared ID. `[fmt.cross_refs] enabled = true`
# makes `grund fmt --write` keep every `§…` citation in the `.md` tree wrapped in a
# clickable link to its declaration (§FS-fmt.6) — idempotent, so it is a no-op
# when nothing drifted; a heading rename or file move shows up as a one-line
# `fmt` diff and pre-commit aborts so the change can be re-staged. `lychee
# --include-fragments` then checks that those links — and every other Markdown
# link — resolve, *including* the `#fragment` (§DF-github-anchor-fidelity), so a
# stale anchor fails the commit.
#
# Uses `cargo run` so a fresh clone needs no installed `grund`; if you have the
# binary on PATH, swap each `entry` for `grund …` (the form shown in the README).
#
# One-time setup:
#   pip install pre-commit
#   cargo install lychee
#   pre-commit install
#   pre-commit install --hook-type commit-msg   # for the attribution hook below
repos:
  - repo: local
    hooks:
      - id: grund-check
        name: grund check
        entry: cargo run --quiet -- check
        language: system
        pass_filenames: false
        always_run: true
      - id: grund-fmt
        name: grund fmt
        entry: cargo run --quiet -- fmt --write
        language: system
        pass_filenames: false
        always_run: true
      - id: lychee
        name: lychee
        entry: lychee --no-progress --include-fragments README.md docs examples
        language: system
        pass_filenames: false
        always_run: true
      - id: no-claude-attribution
        name: no Claude attribution boilerplate (staged files)
        entry: scripts/check-no-claude-attribution.sh
        language: system
        # Run against staged file content. The script accepts the file list
        # pre-commit passes. The script's own source documents the patterns
        # it blocks; exclude it so the hook does not flag itself.
        pass_filenames: true
        exclude: ^scripts/check-no-claude-attribution\.sh$
      - id: no-claude-attribution-commit-msg
        name: no Claude attribution boilerplate (commit message)
        entry: scripts/check-no-claude-attribution.sh
        language: system
        # Same script, second stage. pre-commit passes the commit-message
        # file as the single argument; the script greps it with the same
        # patterns as the staged-files hook. Catches Co-Authored-By: Claude
        # and 🤖-style trailers that slip into commit messages even when no
        # tracked file contains them.
        stages: [commit-msg]
        pass_filenames: true
        always_run: true
